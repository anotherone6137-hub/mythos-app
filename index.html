<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mythos Study System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1a2e;
      color: #e0d7c6;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #16213e, #0f3460);
      padding: 20px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #e2b96f;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 1.6rem;
      color: #e2b96f;
      letter-spacing: 1px;
    }

    header button {
      background: #e2b96f;
      color: #1a1a2e;
      border: none;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
    }

    /* ===== LIST VIEW ===== */
    #listView { padding: 30px; }

    .add-form {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
      padding: 24px;
      max-width: 600px;
      margin: 0 auto 30px;
    }

    .add-form h2 {
      color: #e2b96f;
      margin-bottom: 16px;
      font-size: 1.1rem;
    }

    .add-form input,
    .add-form textarea,
    .add-form select {
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #e0d7c6;
      font-size: 0.95rem;
      font-family: inherit;
      autocomplete: off;
    }

    .add-form textarea {
      height: 90px;
      resize: vertical;
    }

    .add-form button {
      width: 100%;
      padding: 12px;
      background: #e2b96f;
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .add-form button:hover { opacity: 0.85; }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #e2b96f;
    }

    .card-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
      border: 2px solid #e2b96f;
    }

    .card-avatar-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #0f3460;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      border: 2px solid #e2b96f;
    }

    .card h3 {
      color: #e2b96f;
      font-size: 1.05rem;
      margin-bottom: 6px;
    }

    .card .type-badge {
      display: inline-block;
      background: #0f3460;
      color: #e2b96f;
      font-size: 0.72rem;
      padding: 2px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 0.82rem;
      color: #a89b8a;
      line-height: 1.5;
    }

    /* ===== CHARACTER PAGE VIEW ===== */
    #pageView {
      display: none;
      padding: 30px;
      max-width: 720px;
      margin: 0 auto;
    }

    .back-btn {
      background: transparent;
      border: 1px solid #e2b96f;
      color: #e2b96f;
      padding: 7px 18px;
      border-radius: 20px;
      cursor: pointer;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .page-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #e2b96f;
    }

    .page-avatar-placeholder {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #0f3460;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      border: 3px solid #e2b96f;
      flex-shrink: 0;
    }

    .page-title h2 {
      color: #e2b96f;
      font-size: 1.8rem;
      margin-bottom: 6px;
    }

    .page-actions { display: flex; gap: 10px; margin-top: 8px; }

    .btn-edit {
      background: #0f3460;
      color: #e2b96f;
      border: 1px solid #e2b96f;
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .btn-delete {
      background: transparent;
      color: #c0392b;
      border: 1px solid #c0392b;
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .page-section {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .page-section label {
      display: block;
      font-size: 0.75rem;
      color: #a89b8a;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .page-section p, .page-section .content {
      color: #e0d7c6;
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .backlinks-box {
      background: #16213e;
      border: 1px dashed #0f3460;
      border-radius: 12px;
      padding: 14px 18px;
      margin-top: 10px;
    }

    .backlinks-box label {
      font-size: 0.75rem;
      color: #a89b8a;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .backlinks-box .link {
      display: inline-block;
      margin: 4px 6px 0 0;
    }

    /* ===== EDIT MODE ===== */
    #editView {
      display: none;
      padding: 30px;
      max-width: 600px;
      margin: 0 auto;
    }

    #editView h2 {
      color: #e2b96f;
      margin-bottom: 20px;
    }

    #editView input,
    #editView textarea {
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #e0d7c6;
      font-size: 0.95rem;
      font-family: inherit;
    }

    #editView textarea { height: 120px; resize: vertical; }

    .edit-actions { display: flex; gap: 10px; }

    .btn-save {
      flex: 1;
      padding: 12px;
      background: #e2b96f;
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: transparent;
      color: #a89b8a;
      border: 1px solid #a89b8a;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
    }

    /* ===== LINKS ===== */
    .link {
      color: #7ec8e3;
      cursor: pointer;
      text-decoration: underline;
      font-style: italic;
    }

    .link:hover { color: #e2b96f; }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      color: #a89b8a;
      padding: 40px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

<header>
  <h1>🏛️ Mythos Study System</h1>
  <button onclick="showListView()">+ Add Character</button>
</header>

<!-- ===== LIST VIEW ===== -->
<div id="listView">
  <div class="add-form">
    <h2>➕ Add New Character</h2>
    <input id="name" placeholder="Name (e.g. Zeus)" autocomplete="off">
    <select id="type">
      <option value="">Select Type</option>
      <option value="God">God</option>
      <option value="Goddess">Goddess</option>
      <option value="Titan">Titan</option>
      <option value="Hero">Hero</option>
      <option value="Monster">Monster</option>
      <option value="Mortal">Mortal</option>
      <option value="Demigod">Demigod</option>
      <option value="Other">Other</option>
    </select>
    <input id="parents" placeholder="Parents (comma separated)" autocomplete="off">
    <input id="children" placeholder="Children (comma separated)" autocomplete="off">
    <input id="image" placeholder="Image URL (optional — paste any image link)" autocomplete="off">
    <textarea id="notes" placeholder="Notes — use [[Name]] to link other characters"></textarea>
    <button onclick="addCharacter()">Save Character</button>
  </div>

  <div class="card-grid" id="characters">
    <div class="empty-state">Loading characters...</div>
  </div>
</div>

<!-- ===== PAGE VIEW ===== -->
<div id="pageView">
  <button class="back-btn" onclick="showListView()">⬅ Back to All Characters</button>
  <div id="characterDetails"></div>
</div>

<!-- ===== EDIT VIEW ===== -->
<div id="editView">
  <button class="back-btn" id="editBackBtn">⬅ Cancel</button>
  <h2>✏️ Edit Character</h2>
  <input id="editName" placeholder="Name" autocomplete="off">
  <select id="editType">
    <option value="">Select Type</option>
    <option value="God">God</option>
    <option value="Goddess">Goddess</option>
    <option value="Titan">Titan</option>
    <option value="Hero">Hero</option>
    <option value="Monster">Monster</option>
    <option value="Mortal">Mortal</option>
    <option value="Demigod">Demigod</option>
    <option value="Other">Other</option>
  </select>
  <input id="editParents" placeholder="Parents (comma separated)" autocomplete="off">
  <input id="editChildren" placeholder="Children (comma separated)" autocomplete="off">
  <input id="editImage" placeholder="Image URL" autocomplete="off">
  <textarea id="editNotes" placeholder="Notes — use [[Name]] to link characters"></textarea>
  <div class="edit-actions">
    <button class="btn-save" onclick="saveEdit()">💾 Save Changes</button>
    <button class="btn-cancel" id="editCancelBtn">Cancel</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, addDoc, getDocs,
    deleteDoc, updateDoc, doc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // 🔥 YOUR FIREBASE CONFIG — DO NOT CHANGE
  const firebaseConfig = {
    apiKey: "AIzaSyBP1itoU4XAOoBPEH-BvfqbnkAFYX5nX0s",
    authDomain: "mythos-3fbb6.firebaseapp.com",
    projectId: "mythos-3fbb6",
    storageBucket: "mythos-3fbb6.firebasestorage.app",
    messagingSenderId: "450751645310",
    appId: "1:450751645310:web:f39a9eda324538877afa2f",
    measurementId: "G-8VW7ZWVTHQ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let currentDocId = null;

  // ===== VIEW MANAGEMENT =====
  function showListView() {
    document.getElementById("listView").style.display = "block";
    document.getElementById("pageView").style.display = "none";
    document.getElementById("editView").style.display = "none";
    loadCharacters();
  }

  function showPageView() {
    document.getElementById("listView").style.display = "none";
    document.getElementById("pageView").style.display = "block";
    document.getElementById("editView").style.display = "none";
  }

  function showEditView() {
    document.getElementById("listView").style.display = "none";
    document.getElementById("pageView").style.display = "none";
    document.getElementById("editView").style.display = "block";
  }

  // ===== PARSE [[LINKS]] =====
  function parseLinks(text) {
    if (!text) return "";
    return text.replace(/\[\[(.*?)\]\]/g, (match, p1) => {
      return `<span class="link" onclick="window.openCharacterPage('${p1}')">${p1}</span>`;
    });
  }

  // ===== TYPE EMOJI =====
  function typeEmoji(type) {
    const map = {
      "God": "⚡", "Goddess": "🌟", "Titan": "🗿",
      "Hero": "🛡️", "Monster": "🐉", "Mortal": "🧑",
      "Demigod": "✨", "Other": "📜"
    };
    return map[type] || "📜";
  }

  // ===== ADD CHARACTER =====
  async function addCharacter() {
    try {
      const name = document.getElementById("name").value.trim();
      if (!name) { alert("Please enter a name."); return; }

      const type = document.getElementById("type").value;
      const parents = document.getElementById("parents").value.split(",").map(s => s.trim()).filter(Boolean);
      const children = document.getElementById("children").value.split(",").map(s => s.trim()).filter(Boolean);
      const image = document.getElementById("image").value.trim();
      const notes = document.getElementById("notes").value.trim();

      await addDoc(collection(db, "characters"), { name, type, parents, children, image, notes });

      // Clear form
      ["name","parents","children","image","notes"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("type").value = "";

      alert(`✅ ${name} saved!`);
      loadCharacters();

    } catch (error) {
      console.error("ERROR:", error);
      alert("Error: " + error.message);
    }
  }

  // ===== LOAD CHARACTER CARDS =====
  async function loadCharacters() {
    const container = document.getElementById("characters");
    container.innerHTML = "<div class=\"empty-state\">Loading...</div>";

    try {
      const querySnapshot = await getDocs(collection(db, "characters"));

      if (querySnapshot.empty) {
        container.innerHTML = "<div class=\"empty-state\">No characters yet. Add your first one above! 🏛️</div>";
        return;
      }

      container.innerHTML = "";

      querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const div = document.createElement("div");
        div.className = "card";

        const avatarHTML = data.image
          ? `<img class="card-avatar" src="${data.image}" onerror="this.style.display='none'">`
          : `<div class="card-avatar-placeholder">${typeEmoji(data.type)}</div>`;

        div.innerHTML = `
          ${avatarHTML}
          <h3>${data.name}</h3>
          <span class="type-badge">${data.type || "Unknown"}</span>
          <p>${data.notes ? data.notes.replace(/\[\[.*?\]\]/g, "").slice(0, 60) + (data.notes.length > 60 ? "..." : "") : "No notes yet."}</p>
        `;

        div.onclick = () => openCharacterPage(data.name);
        container.appendChild(div);
      });

    } catch (error) {
      container.innerHTML = `<div class="empty-state">Error loading: ${error.message}</div>`;
    }
  }

  // ===== OPEN CHARACTER PAGE =====
  async function openCharacterPage(name) {
    showPageView();
    const container = document.getElementById("characterDetails");
    container.innerHTML = "<div class=\"empty-state\">Loading...</div>";

    const querySnapshot = await getDocs(collection(db, "characters"));
    let found = false;

    for (const docSnap of querySnapshot.docs) {
      const data = docSnap.data();

      if (data.name.toLowerCase() === name.toLowerCase()) {
        found = true;
        currentDocId = docSnap.id;

        // Get backlinks
        const backlinks = [];
        querySnapshot.forEach((d) => {
          const dd = d.data();
          if (dd.notes && dd.notes.includes(`[[${data.name}]]`) && dd.name !== data.name) {
            backlinks.push(dd.name);
          }
        });

        const avatarHTML = data.image
          ? `<img class="page-avatar" src="${data.image}" onerror="this.style.display='none'">`
          : `<div class="page-avatar-placeholder">${typeEmoji(data.type)}</div>`;

        container.innerHTML = `
          <div class="page-header">
            ${avatarHTML}
            <div class="page-title">
              <h2>${data.name}</h2>
              <span class="type-badge">${data.type || "Unknown"}</span>
              <div class="page-actions">
                <button class="btn-edit" onclick="window.editCharacter('${docSnap.id}')">✏️ Edit</button>
                <button class="btn-delete" onclick="window.deleteCharacter('${docSnap.id}')">🗑️ Delete</button>
              </div>
            </div>
          </div>

          ${data.parents && data.parents.length > 0 ? `
          <div class="page-section">
            <label>Parents</label>
            <p>${data.parents.map(p => p ? `<span class="link" onclick="window.openCharacterPage('${p}')">${p}</span>` : "").join(", ")}</p>
          </div>` : ""}

          ${data.children && data.children.length > 0 ? `
          <div class="page-section">
            <label>Children</label>
            <p>${data.children.map(c => c ? `<span class="link" onclick="window.openCharacterPage('${c}')">${c}</span>` : "").join(", ")}</p>
          </div>` : ""}

          ${data.notes ? `
          <div class="page-section">
            <label>Notes</label>
            <div class="content">${parseLinks(data.notes)}</div>
          </div>` : ""}

          ${backlinks.length > 0 ? `
          <div class="backlinks-box">
            <label>🔗 Linked From</label>
            <p>${backlinks.map(b => `<span class="link" onclick="window.openCharacterPage('${b}')">${b}</span>`).join(", ")}</p>
          </div>` : ""}
        `;

        break;
      }
    }

    if (!found) container.innerHTML = `<div class="empty-state">Character "${name}" not found.</div>`;
  }

  // ===== EDIT CHARACTER =====
  async function editCharacter(docId) {
    const querySnapshot = await getDocs(collection(db, "characters"));

    for (const docSnap of querySnapshot.docs) {
      if (docSnap.id === docId) {
        const data = docSnap.data();
        currentDocId = docId;

        document.getElementById("editName").value = data.name || "";
        document.getElementById("editType").value = data.type || "";
        document.getElementById("editParents").value = (data.parents || []).join(", ");
        document.getElementById("editChildren").value = (data.children || []).join(", ");
        document.getElementById("editImage").value = data.image || "";
        document.getElementById("editNotes").value = data.notes || "";

        document.getElementById("editBackBtn").onclick = () => openCharacterPage(data.name);
        document.getElementById("editCancelBtn").onclick = () => openCharacterPage(data.name);

        showEditView();
        break;
      }
    }
  }

  // ===== SAVE EDITS =====
  async function saveEdit() {
    if (!currentDocId) return;

    try {
      const name = document.getElementById("editName").value.trim();
      if (!name) { alert("Name cannot be empty."); return; }

      const type = document.getElementById("editType").value;
      const parents = document.getElementById("editParents").value.split(",").map(s => s.trim()).filter(Boolean);
      const children = document.getElementById("editChildren").value.split(",").map(s => s.trim()).filter(Boolean);
      const image = document.getElementById("editImage").value.trim();
      const notes = document.getElementById("editNotes").value.trim();

      await updateDoc(doc(db, "characters", currentDocId), { name, type, parents, children, image, notes });

      alert("✅ Changes saved!");
      openCharacterPage(name);

    } catch (error) {
      console.error("EDIT ERROR:", error);
      alert("Error saving: " + error.message);
    }
  }

  // ===== DELETE CHARACTER =====
  async function deleteCharacter(docId) {
    if (!confirm("Are you sure you want to delete this character?")) return;

    try {
      await deleteDoc(doc(db, "characters", docId));
      alert("🗑️ Character deleted.");
      showListView();
    } catch (error) {
      alert("Error deleting: " + error.message);
    }
  }

  // ===== EXPOSE TO GLOBAL (needed for onclick in HTML) =====
  window.addCharacter = addCharacter;
  window.loadCharacters = loadCharacters;
  window.openCharacterPage = openCharacterPage;
  window.editCharacter = editCharacter;
  window.saveEdit = saveEdit;
  window.deleteCharacter = deleteCharacter;
  window.showListView = showListView;

  // ===== INIT =====
  loadCharacters();
</script>

</body>
</html>
