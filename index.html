<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mythos Study System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏛️ Mythos Study System</h1>

<div class="form">
  <input id="name" placeholder="Name (e.g. Zeus)">
  <input id="type" placeholder="Type (God/Hero)">
  <input id="parents" placeholder="Parents (comma separated)">
  <input id="children" placeholder="Children (comma separated)">
  <textarea id="notes" placeholder="Use [[Name]] to link characters"></textarea>
  <button onclick="addCharacter()">Add Character</button>
</div>

<h2>📚 Characters</h2>
<div id="characters"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBP1itoU4XAOoBPEH-BvfqbnkAFYX5nX0s",
    authDomain: "mythos-3fbb6.firebaseapp.com",
    projectId: "mythos-3fbb6",
    storageBucket: "mythos-3fbb6.firebasestorage.app",
    messagingSenderId: "450751645310",
    appId: "1:450751645310:web:f39a9eda324538877afa2f",
    measurementId: "G-8VW7ZWVTHQ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 🔗 Convert [[links]] into clickable elements
  function parseLinks(text) {
    return text.replace(/\[\[(.*?)\]\]/g, (match, p1) => {
      return `<span class="link" onclick="openCharacter('${p1}')">${p1}</span>`;
    });
  }

  // 🔍 Open character from link
  async function openCharacter(name) {
    const querySnapshot = await getDocs(collection(db, "characters"));

    querySnapshot.forEach((doc) => {
      const data = doc.data();

      if (data.name.toLowerCase() === name.toLowerCase()) {
        alert(
          `${data.name}\nType: ${data.type}\nParents: ${data.parents.join(", ")}\nChildren: ${data.children.join(", ")}\n\n${data.notes}`
        );
      }
    });
  }

  // 🔄 Find backlinks
  async function getBacklinks(name) {
    const results = [];
    const querySnapshot = await getDocs(collection(db, "characters"));

    querySnapshot.forEach((doc) => {
      const data = doc.data();

      if (data.notes && data.notes.includes(`[[${name}]]`)) {
        results.push(data.name);
      }
    });

    return results;
  }

  // ➕ Add Character
  async function addCharacter() {
    try {
      const name = document.getElementById("name").value;
      const type = document.getElementById("type").value;
      const parents = document.getElementById("parents").value.split(",");
      const children = document.getElementById("children").value.split(",");
      const notes = document.getElementById("notes").value;

      await addDoc(collection(db, "characters"), {
        name,
        type,
        parents,
        children,
        notes
      });

      alert("Character saved!");
      loadCharacters();

    } catch (error) {
      console.error("ERROR:", error);
      alert("Error: " + error.message);
    }
  }

  // 📥 Load Characters
  async function loadCharacters() {
    const container = document.getElementById("characters");
    container.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "characters"));

    querySnapshot.forEach((doc) => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>${data.name}</h3>
        <p><b>Type:</b> ${data.type}</p>
        <p><b>Parents:</b> ${data.parents.join(", ")}</p>
        <p><b>Children:</b> ${data.children.join(", ")}</p>
        <p>${parseLinks(data.notes || "")}</p>
      `;

      // 🔄 Add backlinks
      getBacklinks(data.name).then((links) => {
        if (links.length > 0) {
          const p = document.createElement("p");
          p.innerHTML = `<b>Linked from:</b> ${links.join(", ")}`;
          div.appendChild(p);
        }
      });

      container.appendChild(div);
    });
  }

  window.addCharacter = addCharacter;
  window.openCharacter = openCharacter;

  loadCharacters();
</script>

</body>
</html>
